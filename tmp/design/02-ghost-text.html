<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghost Text Inline Completion — File Manager Command Overlay</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #1a1a2e;
    --col-bg: #16213e;
    --col-border: #0f3460;
    --accent: #7c3aed;
    --accent-dim: rgba(124, 58, 237, 0.5);
    --text: #e2e8f0;
    --text-dim: #64748b;
    --white: #f8fafc;
    --dir-color: #38bdf8;
    --file-color: #cbd5e1;
    --selected-bg: rgba(124, 58, 237, 0.25);
    --strip-bg: rgba(22, 33, 62, 0.85);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Title bar */
  .titlebar {
    height: 38px;
    background: #0d1117;
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 8px;
    -webkit-app-region: drag;
    flex-shrink: 0;
  }
  .titlebar .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot.r { background: #ff5f57; }
  .dot.y { background: #febc2e; }
  .dot.g { background: #28c840; }
  .titlebar span {
    flex: 1;
    text-align: center;
    font-size: 13px;
    color: var(--text-dim);
    font-weight: 500;
  }

  /* Breadcrumb */
  .breadcrumb {
    height: 32px;
    background: #111827;
    display: flex;
    align-items: center;
    padding: 0 16px;
    font-size: 12px;
    color: var(--text-dim);
    gap: 6px;
    flex-shrink: 0;
  }
  .breadcrumb .sep { color: #374151; }
  .breadcrumb .cur { color: var(--accent); }

  /* Miller columns */
  .miller {
    flex: 1;
    display: flex;
    overflow: hidden;
  }
  .column {
    flex: 1;
    background: var(--col-bg);
    border-right: 1px solid var(--col-border);
    overflow-y: auto;
    padding: 4px 0;
  }
  .column:last-child { border-right: none; }

  .entry {
    padding: 5px 14px;
    font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
    font-size: 13px;
    cursor: default;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }
  .entry .icon { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; }
  .entry.dir .name { color: var(--dir-color); }
  .entry.file .name { color: var(--file-color); }
  .entry.selected {
    background: var(--selected-bg);
    border-left: 2px solid var(--accent);
    padding-left: 12px;
  }
  .entry:hover:not(.selected) { background: rgba(255,255,255,0.03); }

  /* Status bar */
  .statusbar {
    height: 26px;
    background: #0d1117;
    display: flex;
    align-items: center;
    padding: 0 16px;
    font-size: 11px;
    color: var(--text-dim);
    justify-content: space-between;
    flex-shrink: 0;
  }

  /* Ghost text command strip */
  .command-strip-wrapper {
    position: fixed;
    bottom: 26px; /* above status bar */
    left: 0; right: 0;
    z-index: 100;
    transform: translateY(100%);
    transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .command-strip-wrapper.visible {
    transform: translateY(0);
  }

  .alt-completions {
    background: rgba(13, 17, 23, 0.75);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 4px 20px 6px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .alt-line {
    font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
    font-size: 12px;
    color: rgba(124, 58, 237, 0.3);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .alt-line .alt-idx { color: rgba(124, 58, 237, 0.2); margin-right: 8px; font-size: 10px; }

  .command-strip {
    height: 48px;
    background: var(--strip-bg);
    backdrop-filter: blur(20px) saturate(1.4);
    -webkit-backdrop-filter: blur(20px) saturate(1.4);
    border-top: 1px solid rgba(124, 58, 237, 0.2);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 0;
  }

  .cmd-prompt {
    color: var(--accent);
    font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
    font-size: 14px;
    margin-right: 10px;
    opacity: 0.7;
  }

  .cmd-input-area {
    flex: 1;
    display: flex;
    align-items: center;
    font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
    font-size: 14px;
    position: relative;
    overflow: hidden;
  }
  .cmd-typed {
    color: var(--white);
    white-space: pre;
  }
  .cmd-cursor {
    display: inline-block;
    width: 2px;
    height: 18px;
    background: var(--accent);
    animation: blink 1s step-end infinite;
    vertical-align: middle;
    margin: 0 1px;
    flex-shrink: 0;
  }
  @keyframes blink {
    50% { opacity: 0; }
  }
  .cmd-ghost {
    color: var(--accent);
    opacity: 0.45;
    white-space: pre;
    transition: opacity 0.15s ease;
  }
  .cmd-ghost.solidifying {
    opacity: 1;
    color: var(--white);
    transition: opacity 0.12s ease, color 0.12s ease;
  }
  .cmd-ghost.flash {
    color: var(--accent);
    opacity: 0.9;
    text-shadow: 0 0 8px var(--accent);
  }

  .cmd-right {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-left: auto;
    flex-shrink: 0;
    padding-left: 16px;
  }
  .action-pill {
    background: rgba(124, 58, 237, 0.12);
    border: 1px solid rgba(124, 58, 237, 0.35);
    border-radius: 6px;
    padding: 3px 10px;
    font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
    font-size: 11px;
    color: rgba(124, 58, 237, 0.8);
    white-space: nowrap;
    transition: all 0.15s ease;
  }
  .alt-counter {
    font-size: 10px;
    color: var(--text-dim);
    font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
    min-width: 24px;
    text-align: center;
  }

  /* Hint bar */
  .hint-bar {
    position: fixed;
    bottom: 26px;
    left: 0; right: 0;
    height: 24px;
    z-index: 50;
    background: rgba(13, 17, 23, 0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    font-size: 11px;
    color: var(--text-dim);
    transition: opacity 0.2s;
  }
  .hint-bar.hidden { opacity: 0; pointer-events: none; }
  .hint-bar kbd {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 3px;
    padding: 1px 5px;
    font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
    font-size: 10px;
    color: var(--text);
  }

  /* Toast */
  .toast {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: rgba(124, 58, 237, 0.9);
    backdrop-filter: blur(12px);
    color: white;
    padding: 8px 20px;
    border-radius: 8px;
    font-size: 13px;
    font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
    opacity: 0;
    transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    pointer-events: none;
    z-index: 200;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Crossfade for ghost */
  .cmd-ghost.fading { opacity: 0; transition: opacity 0.08s ease; }
</style>
</head>
<body>

<!-- Title bar -->
<div class="titlebar">
  <div class="dot r"></div>
  <div class="dot y"></div>
  <div class="dot g"></div>
  <span>File Manager — ~/Documents</span>
</div>

<!-- Breadcrumb -->
<div class="breadcrumb">
  <span>~</span><span class="sep">/</span>
  <span class="cur">Documents</span>
</div>

<!-- Miller columns -->
<div class="miller">
  <div class="column" id="col1"></div>
  <div class="column" id="col2"></div>
  <div class="column" id="col3"></div>
</div>

<!-- Hint bar (idle state) -->
<div class="hint-bar" id="hintBar">
  <span>Start typing to command</span>
  <span><kbd>Tab</kbd> accept</span>
  <span><kbd>↓</kbd> cycle</span>
  <span><kbd>Enter</kbd> execute</span>
  <span><kbd>Esc</kbd> dismiss</span>
</div>

<!-- Command strip -->
<div class="command-strip-wrapper" id="cmdWrapper">
  <div class="alt-completions" id="altCompletions"></div>
  <div class="command-strip">
    <span class="cmd-prompt">:</span>
    <div class="cmd-input-area">
      <span class="cmd-typed" id="cmdTyped"></span>
      <span class="cmd-cursor" id="cmdCursor"></span>
      <span class="cmd-ghost" id="cmdGhost"></span>
    </div>
    <div class="cmd-right">
      <span class="alt-counter" id="altCounter"></span>
      <div class="action-pill" id="actionPill"></div>
    </div>
  </div>
</div>

<!-- Status bar -->
<div class="statusbar">
  <span>7 items — 2 directories, 5 files</span>
  <span>~/Documents</span>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// --- File tree data ---
const col1Data = [
  { name: 'Desktop', dir: true },
  { name: 'Documents', dir: true, selected: true },
  { name: 'Downloads', dir: true },
  { name: 'Pictures', dir: true },
  { name: 'Music', dir: true },
  { name: 'Projects', dir: true },
  { name: '.config', dir: true },
];
const col2Data = [
  { name: 'report.pdf', dir: false },
  { name: 'notes.md', dir: false },
  { name: 'budget.xlsx', dir: false },
  { name: 'photos', dir: true },
  { name: 'work', dir: true, selected: true },
];
const col3Data = [
  { name: 'project-alpha', dir: true },
  { name: 'project-beta', dir: true },
  { name: 'README.md', dir: false },
];

function iconFor(entry) {
  if (entry.dir) return '📁';
  const ext = entry.name.split('.').pop();
  const icons = { pdf: '📄', md: '📝', xlsx: '📊' };
  return icons[ext] || '📄';
}

function renderColumn(el, data) {
  el.innerHTML = data.map(e => {
    const cls = [e.dir ? 'dir' : 'file', e.selected ? 'selected' : ''].filter(Boolean).join(' ');
    return `<div class="entry ${cls}">
      <span class="icon">${iconFor(e)}</span>
      <span class="name">${e.name}${e.dir ? '/' : ''}</span>
    </div>`;
  }).join('');
}

renderColumn(document.getElementById('col1'), col1Data);
renderColumn(document.getElementById('col2'), col2Data);
renderColumn(document.getElementById('col3'), col3Data);

// --- Completion engine ---
const completionDB = [
  {
    prefix: 'move to ',
    options: [
      { completion: 'Downloads', action: '↪ Move to ~/Downloads', pill: 'dd → Downloads' },
      { completion: 'Desktop', action: '↪ Move to ~/Desktop', pill: 'dt → Desktop' },
      { completion: 'Projects', action: '↪ Move to ~/Projects', pill: 'pj → Projects' },
    ]
  },
  {
    prefix: 'sort by ',
    options: [
      { completion: 'name', action: '⇅ Sort alphabetically', pill: 'Sort: A→Z' },
      { completion: 'newest', action: '⇅ Sort by modified time', pill: 'Sort: mtime' },
      { completion: 'size', action: '⇅ Sort by file size', pill: 'Sort: size' },
    ]
  },
  {
    prefix: 'go to ',
    options: [
      { completion: 'Desktop', action: '→ Navigate to Desktop', pill: 'cd ~/Desktop' },
      { completion: 'Downloads', action: '→ Navigate to Downloads', pill: 'cd ~/Downloads' },
      { completion: 'Projects', action: '→ Navigate to Projects', pill: 'cd ~/Projects' },
    ]
  },
  {
    prefix: 'delete',
    options: [
      { completion: ' these', action: '🗑 Move to Trash', pill: '⌫ Trash selected' },
    ]
  },
  {
    prefix: 'rename',
    options: [
      { completion: '', action: '✏ Rename selected', pill: 'Rename inline' },
    ]
  },
  {
    prefix: 'new ',
    options: [
      { completion: 'folder', action: '📁 Create new folder', pill: 'mkdir' },
      { completion: 'file', action: '📄 Create new file', pill: 'touch' },
    ]
  },
  {
    prefix: 'copy ',
    options: [
      { completion: 'path', action: '📋 Copy path to clipboard', pill: 'pbcopy' },
      { completion: 'to Downloads', action: '📋 Copy to Downloads', pill: 'cp → Downloads' },
    ]
  },
  {
    prefix: 'open ',
    options: [
      { completion: 'in terminal', action: '🖥 Open terminal here', pill: 'Terminal.app' },
      { completion: 'in finder', action: '🗂 Reveal in Finder', pill: 'Finder' },
      { completion: 'with code', action: '💻 Open in VS Code', pill: 'code .' },
    ]
  },
];

// Flatten for prefix matching
function getCompletions(typed) {
  if (!typed) return null;
  const lower = typed.toLowerCase();

  for (const group of completionDB) {
    // Check if the typed text is a prefix of group.prefix + any option
    if (group.prefix.startsWith(lower)) {
      // User hasn't finished the prefix yet
      const remaining = group.prefix.slice(lower.length);
      const opt = group.options[0];
      return {
        options: group.options.map(o => ({
          ghost: remaining + o.completion,
          action: o.action,
          pill: o.pill,
        })),
        selectedIndex: 0,
      };
    }
    if (lower.startsWith(group.prefix)) {
      // User typed past the prefix — filter options
      const after = lower.slice(group.prefix.length);
      const matching = group.options.filter(o =>
        o.completion.toLowerCase().startsWith(after)
      );
      if (matching.length > 0) {
        return {
          options: matching.map(o => ({
            ghost: o.completion.slice(after.length),
            action: o.action,
            pill: o.pill,
          })),
          selectedIndex: 0,
        };
      }
    }
  }
  return null;
}

// --- UI State ---
let typed = '';
let stripVisible = false;
let currentCompletions = null;
let selectedIdx = 0;

const cmdWrapper = document.getElementById('cmdWrapper');
const cmdTyped = document.getElementById('cmdTyped');
const cmdGhost = document.getElementById('cmdGhost');
const cmdCursor = document.getElementById('cmdCursor');
const actionPill = document.getElementById('actionPill');
const altCounter = document.getElementById('altCounter');
const altCompletions = document.getElementById('altCompletions');
const hintBar = document.getElementById('hintBar');
const toastEl = document.getElementById('toast');

function showStrip() {
  if (!stripVisible) {
    stripVisible = true;
    cmdWrapper.classList.add('visible');
    hintBar.classList.add('hidden');
  }
}

function hideStrip() {
  stripVisible = false;
  typed = '';
  currentCompletions = null;
  selectedIdx = 0;
  cmdWrapper.classList.remove('visible');
  hintBar.classList.remove('hidden');
  updateDisplay();
}

function updateDisplay() {
  cmdTyped.textContent = typed;

  if (currentCompletions && currentCompletions.options.length > 0) {
    const opt = currentCompletions.options[selectedIdx];
    cmdGhost.textContent = opt.ghost;
    actionPill.textContent = opt.pill;
    actionPill.style.display = '';
    const total = currentCompletions.options.length;
    altCounter.textContent = total > 1 ? `${selectedIdx + 1}/${total}` : '';

    // Render alternative completions below
    renderAltCompletions();
  } else {
    cmdGhost.textContent = '';
    actionPill.style.display = 'none';
    altCounter.textContent = '';
    altCompletions.innerHTML = '';
  }
}

function renderAltCompletions() {
  if (!currentCompletions || currentCompletions.options.length <= 1) {
    altCompletions.innerHTML = '';
    return;
  }
  // Show up to 3 alternatives (excluding current)
  const lines = [];
  for (let i = 0; i < currentCompletions.options.length && lines.length < 3; i++) {
    if (i === selectedIdx) continue;
    const opt = currentCompletions.options[i];
    lines.push(`<div class="alt-line">
      <span class="alt-idx">${i + 1}</span>${typed}${opt.ghost}<span style="margin-left:12px;opacity:0.5">${opt.action}</span>
    </div>`);
  }
  altCompletions.innerHTML = lines.join('');
}

function refreshCompletions() {
  currentCompletions = getCompletions(typed);
  selectedIdx = 0;
  updateDisplay();
}

// --- Animations ---
function animateSolidify(callback) {
  cmdGhost.classList.add('flash');
  setTimeout(() => {
    cmdGhost.classList.remove('flash');
    cmdGhost.classList.add('solidifying');
    setTimeout(() => {
      cmdGhost.classList.remove('solidifying');
      if (callback) callback();
    }, 150);
  }, 100);
}

function animateCrossfade(newIdx) {
  cmdGhost.classList.add('fading');
  setTimeout(() => {
    selectedIdx = newIdx;
    updateDisplay();
    cmdGhost.classList.remove('fading');
  }, 90);
}

function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 1800);
}

// --- Keyboard handler ---
document.addEventListener('keydown', (e) => {
  // Escape dismisses
  if (e.key === 'Escape') {
    e.preventDefault();
    hideStrip();
    return;
  }

  // Tab accepts ghost text
  if (e.key === 'Tab' && stripVisible && currentCompletions) {
    e.preventDefault();
    const opt = currentCompletions.options[selectedIdx];
    if (opt.ghost) {
      animateSolidify(() => {
        typed += opt.ghost;
        refreshCompletions();
      });
    }
    return;
  }

  // Down arrow cycles alternatives
  if (e.key === 'ArrowDown' && stripVisible && currentCompletions) {
    e.preventDefault();
    if (currentCompletions.options.length > 1) {
      const newIdx = (selectedIdx + 1) % currentCompletions.options.length;
      animateCrossfade(newIdx);
    }
    return;
  }

  // Up arrow cycles backwards
  if (e.key === 'ArrowUp' && stripVisible && currentCompletions) {
    e.preventDefault();
    if (currentCompletions.options.length > 1) {
      const newIdx = (selectedIdx - 1 + currentCompletions.options.length) % currentCompletions.options.length;
      animateCrossfade(newIdx);
    }
    return;
  }

  // Enter executes
  if (e.key === 'Enter' && stripVisible) {
    e.preventDefault();
    let action = 'Unknown action';
    if (currentCompletions && currentCompletions.options.length > 0) {
      action = currentCompletions.options[selectedIdx].action;
    }
    showToast(`Executed: ${action}`);
    hideStrip();
    return;
  }

  // Backspace
  if (e.key === 'Backspace' && stripVisible) {
    e.preventDefault();
    if (typed.length > 0) {
      typed = typed.slice(0, -1);
      if (typed.length === 0) {
        hideStrip();
      } else {
        refreshCompletions();
      }
    }
    return;
  }

  // Printable characters
  if (e.key.length === 1 && !e.metaKey && !e.ctrlKey) {
    e.preventDefault();
    typed += e.key;
    showStrip();
    refreshCompletions();
  }
});

// Initial state
updateDisplay();
</script>
</body>
</html>
