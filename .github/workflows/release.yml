name: Release

on:
  push:
    tags:
      - 'v*'

# Default GITHUB_TOKEN is read-only; the upload step needs contents:write
# to create the release and attach the dmg/zip assets.
permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    # Hoist the tap PAT to job-level env so the tap-update step can gate
    # itself on its presence via `if: env.HOMEBREW_TAP_TOKEN != ''` (GH
    # Actions can't reference `secrets.*` directly inside `if`).
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # node-gyp (used by electron-builder when rebuilding native deps
      # like node-pty) needs distutils, which Python 3.12 removed.
      # Pin Python 3.11 so the rebuild succeeds on current macos-14
      # runners (default Python is 3.13+).
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: npm ci

      - name: Build (native helper + renderer + main)
        # `npm run build` chains build:native (Swift sharer helper required
        # for the Share verb's NSSharingServicePicker), then tsc -b, then
        # vite build. Keeping this as a single step ensures the native
        # binary is produced before electron-builder's extraResources
        # tries to bundle it.
        run: npm run build

      - name: Package with electron-builder
        env:
          # Unsigned distribution — no Apple Developer cert required.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --mac dmg zip --arm64 --x64 --publish=never

      - name: Compute SHA256 for cask
        id: shas
        run: |
          cd release
          for f in *.dmg *.zip; do
            [ -f "$f" ] || continue
            echo "$f  $(shasum -a 256 "$f" | awk '{print $1}')"
          done | tee shasums.txt

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.zip
            release/shasums.txt
          generate_release_notes: true

      # Keep the Homebrew tap cask in lockstep with this release so that
      # `brew upgrade --cask breezefile` picks up the new version the moment
      # the GitHub release goes live (which is also when UpdateChip starts
      # nudging users about it). Requires a repo secret HOMEBREW_TAP_TOKEN
      # — a fine-grained PAT with Contents: Write on vivekdse/homebrew-tap.
      - name: Update Homebrew tap cask
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ARM_DMG="release/Breezefile-${VERSION}-arm64.dmg"
          X64_DMG="release/Breezefile-${VERSION}-x64.dmg"
          ARM_SHA=$(shasum -a 256 "$ARM_DMG" | awk '{print $1}')
          X64_SHA=$(shasum -a 256 "$X64_DMG" | awk '{print $1}')

          TAP_DIR="$RUNNER_TEMP/homebrew-tap"
          # Auth via the x-access-token URL form. The Bearer-header
          # approach succeeded on clone but failed on push ("could not
          # read Username for github.com") with fine-grained PATs;
          # x-access-token is the documented form GitHub Actions itself
          # uses and works for both classic and fine-grained PATs.
          AUTH_URL="https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/vivekdse/homebrew-tap.git"
          git clone --depth 1 "$AUTH_URL" "$TAP_DIR"

          CASK="$TAP_DIR/Casks/breezefile.rb"
          mkdir -p "$(dirname "$CASK")"
          sed \
            -e "s|VERSION|${VERSION}|g" \
            -e "s|ARM64SHA|${ARM_SHA}|g" \
            -e "s|X64SHA|${X64_SHA}|g" \
            packaging/breezefile.rb.template > "$CASK"

          cd "$TAP_DIR"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/breezefile.rb
          if git diff --cached --quiet; then
            echo "Cask already up to date."
            exit 0
          fi
          git commit -m "breezefile ${VERSION}"
          git push origin HEAD
